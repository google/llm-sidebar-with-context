<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Engine</title>
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="../../favicons/favicon-48x48.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../../favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../../favicons/favicon-16x16.png"
    />
    <link rel="stylesheet" href="../styles/sidebar.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header: Model Select + Action Buttons -->
      <header class="sidebar-header">
        <span class="sidebar-header__title">Browser Engine</span>
        <nav class="sidebar-header__actions" aria-label="Chat actions">
          <div id="model-select" class="dropdown-wrapper"></div>
          <button id="new-chat-button" class="btn btn--ghost" title="New Chat">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M3 12h18" />
              <path d="M12 3v18" />
            </svg>
          </button>
          <button
            id="toggle-settings-button"
            class="btn btn--ghost"
            title="Settings"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </nav>
      </header>

      <!-- Main Content: Chat Messages or Settings -->
      <main
        id="messages"
        role="log"
        aria-live="polite"
        aria-label="Chat messages"
      >
        <!-- Welcome message or chat history rendered dynamically -->
      </main>

      <!-- Settings View (toggled) -->
      <section id="settings-view" class="hidden" aria-label="Settings">
        <div class="settings-container">
          <h2>Settings</h2>
          <div
            id="settings-error"
            class="settings-error hidden"
            role="alert"
          ></div>

          <section class="settings-section">
            <h3 class="settings-label">Theme</h3>
            <div
              id="theme-select"
              class="dropdown-wrapper dropdown-wrapper--block"
            ></div>
          </section>

          <section class="settings-section">
            <h3 class="settings-label">Gemini API Key</h3>
            <div class="api-key-help">
              Get your API Key for free on
              <a href="https://aistudio.google.com/api-keys" target="_blank"
                >Google AI Studio</a
              >
              <div class="terms-text">
                Please read the API's
                <a href="https://ai.google.dev/gemini-api/terms" target="_blank"
                  >terms of service</a
                >
              </div>
            </div>
            <input
              type="password"
              id="api-key-input"
              placeholder="Enter your Gemini API Key"
              autocomplete="off"
              aria-label="Gemini API Key"
            />
          </section>

          <div class="settings-actions">
            <button id="save-settings-button" class="btn btn--primary">
              Save Changes
            </button>
            <button id="cancel-settings-button" class="btn btn--secondary">
              Cancel
            </button>
          </div>
        </div>

        <footer id="legal-panel">
          <nav class="legal-links" aria-label="Legal information">
            <a href="{{LEGAL_NOTICE_URL}}" target="_blank">Legal Notice</a>
            <a href="{{PRIVACY_POLICY_URL}}" target="_blank">Privacy Policy</a>
            <a href="{{LICENSE_URL}}" target="_blank">License</a>
          </nav>
        </footer>
      </section>

      <!-- Bottom Panel: Pinned Tabs + Chat Input -->
      <footer class="bottom-panel">
        <!-- Pinned Contexts -->
        <section id="pinned-tabs-container" aria-label="Pinned tabs context">
          <div id="current-tab"></div>
          <div id="pinned-tabs"></div>
        </section>

        <!-- Prompt Input -->
        <form id="prompt-form" autocomplete="off">
          <textarea
            id="prompt-input"
            placeholder="Ask anything or type / for prompts..."
            rows="1"
            aria-label="Type your prompt"
          ></textarea>
          <button type="submit" id="send-button" aria-label="Send prompt">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"
              />
              <path d="m21.854 2.147-10.94 10.939" />
            </svg>
          </button>
        </form>
      </footer>
    </div>
    <script type="module" src="../scripts/sidebar.js"></script>
  </body>
</html>
